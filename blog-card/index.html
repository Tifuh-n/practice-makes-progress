<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="style.css">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="container">
    <div class="blog-img">
      <img src="./assets/images/illustration-article.svg" alt="Blog image">
    </div>
    <div class="blog-content">
      <div class="tag">
        Learning
      </div>
      <p>Published 21 Dec 2023</p>
      <h1>HTML & CSS foundations</h1>
      <div class="blog-text">
        <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
    </div>
  
  <div class="blog-author">
    <img src="./assets/images/image-avatar.webp" alt="Author's profile picture">
    <div class="author-info">
      <h2>Greg Hooper</h2>
    </div>
  </div>
</div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Tifuh</a>.
  </footer>
</body>
</html>
