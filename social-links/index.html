<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="profile-image">
        <img src="./assets/images/avatar-jessica.jpeg" alt="Profile image"/>
      </div>

      <div class="card-desc">
        <h1 class="name">Jessica Randall</h1>
        <p class="location">London, United Kingdom</p>
        <p class="bio">"Front-end developer and avid reader."</p>
      </div>

      <div class="social-links">
        <div class="social-link">
          <a href="">
            <span class="social-link-text">GitHub</span>
          
          </a>
        </div>

        <div class="social-link">
          <a href="">
            <span class="social-link-text">Frontend Mentor</span>
          </a>
        </div>

        <div class="social-link">
          <a href="">
            <span class="social-link-text">LinkedIn</span>
          </a>
        </div>

        <div class="social-link">
          <a href="">
            <span class="social-link-text">Twitter</span>
          </a>
        </div>

        <div class="social-link">
          <a href="">
            <span class="social-link-text">Instagram</span>
          </a>
        </div>

      </div>

    </div>
  </div>

  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Tifuh</a>.
  </footer>
</body>
</html>
